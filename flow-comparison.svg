<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 820" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#eef1f5"/>
    </linearGradient>
    <linearGradient id="origHead" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b7280"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <linearGradient id="newHead" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#7c3aed40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="820" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="430" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">Voice Interaction Flow Comparison</text>
  <text x="430" y="64" text-anchor="middle" font-size="13" fill="#6b7280">Standard Dictation vs Typeless Auto Submit</text>

  <!-- ========== LEFT: Original Flow ========== -->
  <g transform="translate(30, 90)">
    <!-- Header -->
    <rect width="380" height="44" rx="10" fill="url(#origHead)"/>
    <text x="190" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="white">Original Flow</text>

    <!-- Step 1 -->
    <rect y="60" width="380" height="56" rx="10" fill="white" filter="url(#shadow)"/>
    <circle cx="32" cy="88" r="14" fill="#e5e7eb"/>
    <text x="32" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280">1</text>
    <text x="58" y="84" font-size="14" font-weight="600" fill="#374151">Press Fn</text>
    <text x="58" y="102" font-size="12" fill="#6b7280">Start macOS dictation</text>

    <!-- Arrow -->
    <path d="M190 116 L190 130" stroke="#d1d5db" stroke-width="2"/>

    <!-- Step 2 -->
    <rect y="132" width="380" height="56" rx="10" fill="white" filter="url(#shadow)"/>
    <circle cx="32" cy="160" r="14" fill="#e5e7eb"/>
    <text x="32" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280">2</text>
    <text x="58" y="156" font-size="14" font-weight="600" fill="#374151">Speak</text>
    <text x="58" y="174" font-size="12" fill="#6b7280">Dictate your message</text>

    <!-- Arrow -->
    <path d="M190 188 L190 202" stroke="#d1d5db" stroke-width="2"/>

    <!-- Step 3 -->
    <rect y="204" width="380" height="56" rx="10" fill="white" filter="url(#shadow)"/>
    <circle cx="32" cy="232" r="14" fill="#e5e7eb"/>
    <text x="32" y="237" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280">3</text>
    <text x="58" y="228" font-size="14" font-weight="600" fill="#374151">Press Fn</text>
    <text x="58" y="246" font-size="12" fill="#6b7280">Stop dictation, text inserted</text>

    <!-- Arrow -->
    <path d="M190 260 L190 274" stroke="#d1d5db" stroke-width="2"/>

    <!-- Step 4 - Manual -->
    <rect y="276" width="380" height="56" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="32" cy="304" r="14" fill="#fee2e2"/>
    <text x="32" y="309" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">4</text>
    <text x="58" y="298" font-size="14" font-weight="600" fill="#dc2626">Review text</text>
    <text x="58" y="316" font-size="12" fill="#b91c1c">Read and check dictated text</text>

    <!-- Arrow -->
    <path d="M190 332 L190 346" stroke="#fca5a5" stroke-width="2"/>

    <!-- Step 5 - Manual -->
    <rect y="348" width="380" height="56" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="32" cy="376" r="14" fill="#fee2e2"/>
    <text x="32" y="381" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">5</text>
    <text x="58" y="370" font-size="14" font-weight="600" fill="#dc2626">Press Enter</text>
    <text x="58" y="388" font-size="12" fill="#b91c1c">Manually submit message</text>

    <!-- Arrow -->
    <path d="M190 404 L190 418" stroke="#d1d5db" stroke-width="2"/>

    <!-- Step 6 - Wait -->
    <rect y="420" width="380" height="56" rx="10" fill="white" filter="url(#shadow)"/>
    <circle cx="32" cy="448" r="14" fill="#e5e7eb"/>
    <text x="32" y="453" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280">6</text>
    <text x="58" y="442" font-size="14" font-weight="600" fill="#374151">Wait for response</text>
    <text x="58" y="460" font-size="12" fill="#6b7280">Claude Code generates reply</text>

    <!-- Arrow -->
    <path d="M190 476 L190 490" stroke="#d1d5db" stroke-width="2"/>

    <!-- Step 7 - Manual read -->
    <rect y="492" width="380" height="56" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="32" cy="520" r="14" fill="#fee2e2"/>
    <text x="32" y="525" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">7</text>
    <text x="58" y="514" font-size="14" font-weight="600" fill="#dc2626">Read response</text>
    <text x="58" y="532" font-size="12" fill="#b91c1c">Manually read text on screen</text>

    <!-- Arrow -->
    <path d="M190 548 L190 562" stroke="#d1d5db" stroke-width="2"/>

    <!-- Result -->
    <rect y="564" width="380" height="48" rx="10" fill="#f3f4f6" filter="url(#shadow)"/>
    <text x="190" y="594" text-anchor="middle" font-size="14" font-weight="600" fill="#6b7280">Interaction Complete</text>

    <!-- Stats -->
    <rect y="628" width="380" height="52" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="190" y="650" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">7 steps  ·  3 manual actions</text>
    <text x="190" y="670" text-anchor="middle" font-size="11" fill="#ef4444">Eyes on screen required throughout</text>
  </g>

  <!-- ========== Divider ========== -->
  <line x1="430" y1="100" x2="430" y2="790" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="430" y="806" text-anchor="middle" font-size="12" font-weight="600" fill="#9ca3af">VS</text>

  <!-- ========== RIGHT: Typeless Flow ========== -->
  <g transform="translate(450, 90)">
    <!-- Header -->
    <rect width="380" height="44" rx="10" fill="url(#newHead)" filter="url(#glow)"/>
    <text x="190" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="white">Typeless Auto Submit</text>

    <!-- Step 1 -->
    <rect y="60" width="380" height="56" rx="10" fill="white" filter="url(#shadow)"/>
    <circle cx="32" cy="88" r="14" fill="#ede9fe"/>
    <text x="32" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">1</text>
    <text x="58" y="84" font-size="14" font-weight="600" fill="#374151">Press Fn</text>
    <text x="58" y="102" font-size="12" fill="#6b7280">Start macOS dictation</text>

    <!-- Arrow -->
    <path d="M190 116 L190 130" stroke="#c4b5fd" stroke-width="2"/>

    <!-- Step 2 -->
    <rect y="132" width="380" height="56" rx="10" fill="white" filter="url(#shadow)"/>
    <circle cx="32" cy="160" r="14" fill="#ede9fe"/>
    <text x="32" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">2</text>
    <text x="58" y="156" font-size="14" font-weight="600" fill="#374151">Speak</text>
    <text x="58" y="174" font-size="12" fill="#6b7280">Dictate your message</text>

    <!-- Arrow -->
    <path d="M190 188 L190 202" stroke="#c4b5fd" stroke-width="2"/>

    <!-- Step 3 -->
    <rect y="204" width="380" height="56" rx="10" fill="white" filter="url(#shadow)"/>
    <circle cx="32" cy="232" r="14" fill="#ede9fe"/>
    <text x="32" y="237" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">3</text>
    <text x="58" y="228" font-size="14" font-weight="600" fill="#374151">Press Fn</text>
    <text x="58" y="246" font-size="12" fill="#6b7280">Stop dictation — done!</text>

    <!-- Automated section label -->
    <rect x="100" y="275" width="180" height="24" rx="12" fill="#7c3aed"/>
    <text x="190" y="291" text-anchor="middle" font-size="11" font-weight="600" fill="white">FULLY AUTOMATED BELOW</text>

    <!-- Arrow (automated) -->
    <path d="M190 260 L190 275" stroke="#a78bfa" stroke-width="2"/>
    <path d="M190 299 L190 314" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,3"/>

    <!-- Auto: 2.5s delay -->
    <rect y="316" width="380" height="50" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
    <text x="190" y="338" text-anchor="middle" font-size="13" fill="#7c3aed" font-style="italic">2.5s delay — text insertion completes</text>
    <text x="190" y="355" text-anchor="middle" font-size="11" fill="#8b5cf6">automatic</text>

    <!-- Arrow -->
    <path d="M190 366 L190 380" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,3"/>

    <!-- Auto: Enter -->
    <rect y="382" width="380" height="50" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="32" cy="407" r="14" fill="#dcfce7"/>
    <text x="32" y="412" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">AUTO</text>
    <text x="58" y="402" font-size="14" font-weight="600" fill="#16a34a">Enter sent automatically</text>
    <text x="58" y="418" font-size="12" fill="#15803d">Message submitted to Claude Code</text>

    <!-- Arrow -->
    <path d="M190 432 L190 446" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,3"/>

    <!-- Auto: Claude responds -->
    <rect y="448" width="380" height="50" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
    <text x="190" y="470" text-anchor="middle" font-size="13" fill="#7c3aed" font-style="italic">Claude Code generates response</text>
    <text x="190" y="487" text-anchor="middle" font-size="11" fill="#8b5cf6">automatic</text>

    <!-- Arrow -->
    <path d="M190 498 L190 512" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,3"/>

    <!-- Auto: TTS -->
    <rect y="514" width="380" height="50" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="32" cy="539" r="14" fill="#dcfce7"/>
    <text x="32" y="544" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">TTS</text>
    <text x="58" y="534" font-size="14" font-weight="600" fill="#16a34a">Response read aloud</text>
    <text x="58" y="550" font-size="12" fill="#15803d">macOS TTS speaks the answer</text>

    <!-- Arrow -->
    <path d="M190 564 L190 578" stroke="#86efac" stroke-width="2"/>

    <!-- Result -->
    <rect y="580" width="380" height="48" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1" filter="url(#shadow)"/>
    <text x="190" y="610" text-anchor="middle" font-size="14" font-weight="600" fill="#16a34a">Interaction Complete</text>

    <!-- Stats -->
    <rect y="644" width="380" height="52" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="190" y="666" text-anchor="middle" font-size="13" font-weight="600" fill="#16a34a">3 steps  ·  0 manual actions</text>
    <text x="190" y="686" text-anchor="middle" font-size="11" fill="#16a34a">Fully hands-free after pressing Fn twice</text>
  </g>
</svg>
